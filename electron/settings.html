<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AImpostor Settings</title>
    <link rel="stylesheet" href="settings.css">
  </head>
  <body>
    <main class="panel">
      <header>
        <h1>AImpostor</h1>
      </header>

      <section class="status-panel" aria-live="polite">
        <div class="status-row">
          <span>ChatGPT styling</span>
          <output id="styleStatus">Waiting for ChatGPT</output>
        </div>
        <div class="status-row">
          <span>Shortcut</span>
          <output id="shortcutStatus">Checking shortcut</output>
        </div>
      </section>

      <label class="field">
        <span>Theme</span>
        <select id="theme">
          <option value="light">Anthropic Light</option>
          <option value="dark">Anthropic Dark</option>
        </select>
      </label>

      <section class="font-group">
        <h2>You</h2>
        <label class="field">
          <span>Font</span>
          <select id="userFontPreset">
            <option value="'Anthropic Sans', system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">Claude Sans</option>
            <option value="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif">System Sans</option>
            <option value="'Avenir Next', Avenir, Helvetica, Arial, sans-serif">Avenir Next</option>
            <option value="'Atkinson Hyperlegible', 'Helvetica Neue', Arial, sans-serif">Atkinson Hyperlegible</option>
            <option value="'Helvetica Neue', Helvetica, Arial, sans-serif">Helvetica Neue</option>
            <option value="'SF Mono', Menlo, Monaco, Consolas, monospace">SF Mono</option>
            <option value="custom">Custom</option>
          </select>
        </label>

        <label class="field custom-font" id="userCustomFont" hidden>
          <span>Custom font stack</span>
          <input id="userFontFamily" type="text" spellcheck="false">
        </label>

        <label class="field">
          <span>Size <output id="userFontSizeOutput"></output></span>
          <div class="range-row">
            <input id="userFontSize" type="range" min="10" max="32" step="1">
            <input id="userFontSizeNumber" class="number" type="number" min="10" max="32" step="1">
          </div>
        </label>
      </section>

      <section class="font-group assistant-group">
        <h2>ChatGPT</h2>
        <label class="field">
          <span>Font</span>
          <select id="assistantFontPreset">
            <option value="'Anthropic Serif', 'Claude Local Serif', Georgia, 'Arial Hebrew', 'Noto Sans Hebrew', 'Times New Roman', Times, 'Hiragino Sans', 'Yu Gothic', Meiryo, 'Noto Sans CJK JP', 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans CJK TC', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', serif">Claude Serif</option>
            <option value="'Claude Local Serif', Charter, 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif">Bundled Claude-ish</option>
            <option value="'Iowan Old Style', Georgia, serif">Iowan Old Style</option>
            <option value="Georgia, 'Times New Roman', serif">Georgia</option>
            <option value="Palatino, 'Palatino Linotype', Georgia, serif">Palatino</option>
            <option value="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif">System Sans</option>
            <option value="custom">Custom</option>
          </select>
        </label>

        <label class="field custom-font" id="assistantCustomFont" hidden>
          <span>Custom font stack</span>
          <input id="assistantFontFamily" type="text" spellcheck="false">
        </label>

        <label class="field">
          <span>Size <output id="assistantFontSizeOutput"></output></span>
          <div class="range-row">
            <input id="assistantFontSize" type="range" min="10" max="36" step="1">
            <input id="assistantFontSizeNumber" class="number" type="number" min="10" max="36" step="1">
          </div>
        </label>
      </section>

      <label class="field">
        <span>Line height <output id="lineHeightOutput"></output></span>
        <div class="range-row">
          <input id="lineHeight" type="range" min="1.1" max="2.4" step="0.05">
          <input id="lineHeightNumber" class="number" type="number" min="1.1" max="2.4" step="0.05">
        </div>
      </label>

      <label class="check-row">
        <input id="applyToCode" type="checkbox">
        <span>Apply to code blocks</span>
      </label>

      <section class="font-group shortcut-group">
        <h2>Shortcut</h2>
        <label class="check-row">
          <input id="globalShortcutEnabled" type="checkbox">
          <span>Enable global shortcut</span>
        </label>

        <label class="field">
          <span>Keys</span>
          <div class="shortcut-row">
            <input id="globalShortcut" type="text" spellcheck="false" readonly>
            <button id="recordShortcut" class="secondary small" type="button">Record</button>
          </div>
        </label>
      </section>

      <div class="actions">
        <button id="closeSettings" type="button">Close</button>
        <button id="reset" class="secondary small" type="button">Reset</button>
      </div>
    </main>
    <script src="settings-renderer.js"></script>
  </body>
</html>
